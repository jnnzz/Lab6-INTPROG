openapi: 3.0.3
info:
  title: IntProg Lab6 API
  version: 1.0.0
  description: Full-Stack Authentication System API — Node.js/Express with MySQL
servers:
  - url: http://localhost:4000
    description: Local development
paths:
  /:
    get:
      summary: Health check
      tags:
        - Health
      responses:
        '200':
          description: API is running
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: API is running

  /accounts/authenticate:
    post:
      summary: Authenticate (Login)
      tags:
        - Accounts
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  example: user@example.com
                password:
                  type: string
                  example: password123
      responses:
        '200':
          description: Login successful — returns account details and JWT token
        '400':
          description: Email or password is incorrect

  /accounts/register:
    post:
      summary: Register a new account
      tags:
        - Accounts
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [title, firstName, lastName, email, password, confirmPassword, acceptTerms]
              properties:
                title:
                  type: string
                  example: Mr
                firstName:
                  type: string
                  example: John
                lastName:
                  type: string
                  example: Doe
                email:
                  type: string
                  example: john@example.com
                password:
                  type: string
                  example: password123
                confirmPassword:
                  type: string
                  example: password123
                acceptTerms:
                  type: boolean
                  example: true
      responses:
        '200':
          description: Registration successful, verification email sent

  /accounts/verify-email:
    post:
      summary: Verify email address
      tags:
        - Accounts
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [token]
              properties:
                token:
                  type: string
      responses:
        '200':
          description: Verification successful

  /accounts/forgot-password:
    post:
      summary: Request password reset email
      tags:
        - Accounts
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email:
                  type: string
                  example: user@example.com
      responses:
        '200':
          description: Password reset email sent

  /accounts/validate-reset-token:
    post:
      summary: Validate a password reset token
      tags:
        - Accounts
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [token]
              properties:
                token:
                  type: string
      responses:
        '200':
          description: Token is valid

  /accounts/reset-password:
    post:
      summary: Reset password using token
      tags:
        - Accounts
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [token, password, confirmPassword]
              properties:
                token:
                  type: string
                password:
                  type: string
                  example: newpassword123
                confirmPassword:
                  type: string
                  example: newpassword123
      responses:
        '200':
          description: Password reset successful

  /accounts/refresh-token:
    post:
      summary: Refresh JWT token using refresh token cookie
      tags:
        - Accounts
      responses:
        '200':
          description: Returns new JWT and sets new refresh token cookie
        '401':
          description: Invalid or expired refresh token

  /accounts/revoke-token:
    post:
      summary: Revoke a refresh token (Logout)
      tags:
        - Accounts
      security:
        - bearerAuth: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                token:
                  type: string
                  description: Optional — uses cookie if not provided
      responses:
        '200':
          description: Token revoked

  /accounts:
    get:
      summary: Get all accounts (Admin only)
      tags:
        - Accounts
      security:
        - bearerAuth: []
      responses:
        '200':
          description: List of all accounts
        '401':
          description: Unauthorized
    post:
      summary: Create a new account (Admin only)
      tags:
        - Accounts
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [title, firstName, lastName, email, password, confirmPassword, role]
              properties:
                title:
                  type: string
                firstName:
                  type: string
                lastName:
                  type: string
                email:
                  type: string
                password:
                  type: string
                confirmPassword:
                  type: string
                role:
                  type: string
                  enum: [Admin, User]
      responses:
        '200':
          description: Account created
        '401':
          description: Unauthorized

  /accounts/{id}:
    get:
      summary: Get account by ID
      tags:
        - Accounts
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Account details
        '401':
          description: Unauthorized
        '404':
          description: Account not found
    put:
      summary: Update account
      tags:
        - Accounts
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                title:
                  type: string
                firstName:
                  type: string
                lastName:
                  type: string
                email:
                  type: string
                password:
                  type: string
                confirmPassword:
                  type: string
                role:
                  type: string
                  enum: [Admin, User]
      responses:
        '200':
          description: Account updated
        '401':
          description: Unauthorized
    delete:
      summary: Delete account
      tags:
        - Accounts
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Account deleted
        '401':
          description: Unauthorized

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
